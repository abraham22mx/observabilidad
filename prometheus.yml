# prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'java-services'
    metrics_path: '/actuator/prometheus'  # Ruta para Spring Boot Actuator
    scrape_interval: 10s
    static_configs:
      - targets: 
        - 'service-a:8080'
        - 'service-b:8080'
        - 'service-c:8080'
    # Métricas para etiquetar por servicio
    metric_relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):8080'
        replacement: '${1}'